[package]
name = "ciris-status"
version = "0.1.0"
edition = "2021"
description = "The ciris.ai public health/status surface — the small standalone service that outlives CIRISLens. Serves /health, /v1/status, /api/v1/status, /api/v1/status/history by live outbound probes + a SQLite uptime history. No Grafana/Timescale/OAuth."
license = "AGPL-3.0-or-later"
publish = false

[[bin]]
name = "ciris-status"
path = "src/main.rs"

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "time", "signal", "sync"] }
# rustls (not openssl) so the binary is self-contained and cross-builds cleanly.
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde", "clock"] }
tower-http = { version = "0.6", features = ["cors"] }
futures = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"

[profile.release]
strip = "symbols"
