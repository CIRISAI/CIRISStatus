# ciris-status — a ciris-server fabric node + a StatusAdapter
# (FSD/MONITORING_NODE_DESIGN.md §5).
#
# Flow A reads `capacity:*` signed `scores` from THIS node's OWN corpus and
# projects the public roster; Flow B probes off-fabric infra and emits signed
# `health:liveness` into that same corpus. Serves the website surface
# (`/api/v1/scoring`, SSE/WS, status, history) ciris.ai consumes.
#
# ZERO ENV (ciris-server 0.5 zero-env model). The container boots with only two
# CLI inputs: `--home <data-root>` and `--key-id <federation-key-label>`. There
# are NO environment variables. Everything else — the listen address, the probe
# targets, the poll cadence, the CORS allow-list, and `consent:replication`
# peering — is signed `config:*` / consent CEG, authored by the OWNER at runtime
# via the desktop client (or `POST /v1/config` + `POST /v1/federation/peering`)
# AFTER claiming ownership (NodeCode + the one-time claim PIN on fresh boot).
#
# Topology: this node owns its OWN corpus (the node's ciris_engine.db under the
# data dir, NOT a shared DB with the peer). The peer's `capacity:*` data arrives
# by ANTI-ENTROPY REPLICATION over the federation transport, authorized by a
# DIRECTED consent grant + mutual key registration — NEVER by mounting the peer's
# database.
#
# Usage:
#   1. docker compose up -d
#   2. claim ownership + author config:* (see DEPLOY.md / .env.example)

services:
  ciris-status:
    image: ghcr.io/cirisai/cirisstatus:${CIRIS_STATUS_TAG:-latest}
    # To build locally instead of pulling the blessed image: `docker compose build`.
    build:
      context: .
    container_name: ciris-status
    restart: unless-stopped
    # Zero-env boot: the ONLY inputs are --home (the data root = the mounted
    # volume) and --key-id (this node's federation key label).
    command: ["--home", "/data", "--key-id", "ciris-status"]
    ports:
      # Read API + status routers (the public surface): listen port + 1.
      # Bind to host loopback; nginx/Caddy terminates TLS and proxies in.
      - "127.0.0.1:4243:4243"
      # The Reticulum node port (federation transport / NAT-traversal).
      - "4242:4242"
    volumes:
      # Node data dir (corpus DB + minted identity) AND the uptime-history DB
      # (derived as <data_dir>/status.db). One volume, this node's own corpus.
      - status-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4243/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  status-data:
