name: CI

# fmt + clippy(-D warnings) + build + test. ciris-status is ALWAYS a node now
# (ciris-server + StatusAdapter — the optional `fabric` feature is gone), so there
# is ONE build, and it links the persist/verify substrate. That needs the substrate
# build deps (libtss2-dev for the keyring TPM backend, libsqlite3-dev for persist,
# libudev-dev for the serial-LoRa transport that landed in ciris-server 0.5.68).
# Single Linux target — this is a server-side service (no wheel/binary matrix); the
# published artifact is the GHCR runtime image, exercised by image-runtime-smoke.
#
# CI structure mirrors CIRISServer's canonical ci.yml: concurrency-cancel, apt
# hardening (drop the flaky Microsoft/azure apt repo), and the CIRISCache 4-layer
# centipede (CIRISServer#99) that RESTORES the SAME shared substrate blobs
# CIRISServer publishes for the same PLAT/rustc/versions (byte-identical cache-key
# prefix). CI restores only — it never saves (a debug `target/` save is a net loss).

on:
  push:
    branches: [main]
    # Docs-only commits don't change the Rust build — skip the full compile.
    paths-ignore:
      - "**/*.md"
      - "FSD/**"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "FSD/**"
      - "docs/**"
  workflow_dispatch:

# Cancel a superseded run on the same ref (PR re-push / newer main commit). A tag
# ref is distinct, so this never cancels a release pipeline.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write   # CIRISCache restore (GHCR) — CIRISServer#99

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  build:
    name: clippy + build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install build deps (Linux)
        # libtss2-dev: the Linux-only keyring/tpm backend (cfg(target_os=linux)).
        # libsqlite3-dev: persist's sqlite. libudev-dev: the serialport/LoRa dep.
        run: |
          # Drop the preinstalled Microsoft/azure-cli apt repo: it intermittently
          # 403s and tanks apt-get update (its packages are not needed here).
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/azure-cli.sources
          sudo apt-get update
          sudo apt-get install -y libtss2-dev libsqlite3-dev libudev-dev
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          cache-bin: false
      # CIRISCache (CIRISServer#99) — 4-layer centipede over the Swatinem GHA L1.
      # PLAT from the NATIVE target of the runner. ciris-status is a DIFFERENT
      # downstream than ciris-server, but the shared edge/persist/verify layer blobs
      # are byte-identical across repos for the same PLAT/rustc/versions, so the key
      # PREFIX must match CIRISServer's exactly. persist (P) is pinned in Cargo.toml;
      # edge (EDGE) + verify (V) are TRANSITIVE (via ciris-server) so they are read
      # from Cargo.lock. Restore deepest-first, first-hit-wins; NO -s server blob
      # (that is ciris-server's own crate graph, not ours).
      - name: Compute CIRISCache keys (shared substrate layers, CIRISServer#99)
        id: cachekey
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)   PLAT=linux-x86_64 ;;
            macOS)   PLAT=macos-aarch64 ;;
            Windows) PLAT=windows-x64 ;;
            *)       PLAT=unknown ;;
          esac
          RUSTC=$(rustc -V | awk '{print $2}')
          # persist is pinned in Cargo.toml; edge + verify are transitive → Cargo.lock.
          P=$(grep -m1 'CIRISPersist.*tag = "v' Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          EDGE=$(grep -A1 'name = "ciris-edge"'        Cargo.lock | grep -m1 '^version' | sed -E 's/.*"([0-9.]+)".*/\1/')
          V=$(grep -A1 'name = "ciris-verify-core"'    Cargo.lock | grep -m1 '^version' | sed -E 's/.*"([0-9.]+)".*/\1/')
          BASE="ciris-substrate-v1-${PLAT}-release-rustc${RUSTC}"
          KEY_VERIFY="${BASE}-pnone-enone-v${V:-none}"
          KEY_PERSIST="${BASE}-p${P:-none}-enone-v${V:-none}"
          KEY_EDGE="${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}"
          {
            echo "key-verify=${KEY_VERIFY}"
            echo "key-persist=${KEY_PERSIST}"
            echo "key-edge=${KEY_EDGE}"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::CIRISCache (${PLAT}): P=${P:-NONE} V=${V:-NONE} EDGE=${EDGE:-NONE} RUSTC=${RUSTC}"
          echo "::notice::${KEY_VERIFY}"
          echo "::notice::${KEY_PERSIST}"
          echo "::notice::${KEY_EDGE}"
      # Deepest-first, first-hit-wins (CIRISCache restore@v2): the layers are
      # cumulative supersets, so one restore of the deepest available blob beats
      # extracting verify→persist→edge in sequence.
      - name: CIRISCache restore (edge→persist→verify shared layers, first hit)
        uses: CIRISAI/CIRISCache/restore@v2
        continue-on-error: true
        with:
          keys: |
            ${{ steps.cachekey.outputs.key-edge }}
            ${{ steps.cachekey.outputs.key-persist }}
            ${{ steps.cachekey.outputs.key-verify }}
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: build (release)
        run: cargo build --release
      - name: test — Flow A real-data + Flow B sign proofs
        run: cargo test
      # NB: CI does NOT save a cache blob. It builds DEBUG (clippy+test); saving a
      # debug `target/` measured ~586s on main to spare only the cheap debug delta
      # next run — a net loss. The shared release `-s`/edge/persist/verify blobs are
      # populated by CIRISServer's conformance/build-wheels; CI here only RESTORES.

  # Run the binary INSIDE the actual runtime IMAGE — not just the build host.
  # The build host has the newest glibc + every -dev lib, so a cargo build can be
  # green while the published image crash-loops at exec on a missing runtime lib
  # (libtss2-esys.so.0 → CIRISServer#28) or too-new glibc (GLIBC_2.39 →
  # CIRISServer#33). This catches that whole class: build the image, then exec the
  # binary in it with a fast-failing arg — if it reaches the argparser ("unknown
  # serve arg"), it LOADED (glibc + every .so resolved). A dynamic-link/glibc
  # failure prints "GLIBC_… not found" / "cannot open shared object file" instead,
  # failing the grep.
  image-runtime-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the runtime image
        run: docker build -t ciris-status:smoke .
      - name: Exec the binary in the image (proves it loads — glibc + .so)
        run: |
          set -o pipefail
          out=$(docker run --rm ciris-status:smoke --bogus-flag 2>&1 || true)
          echo "$out"
          # Reaching the argparser ("unknown arg: --bogus-flag … usage: ciris-status")
          # proves the binary LOADED — glibc + every .so resolved. A dynamic-link/glibc
          # failure prints "GLIBC_… not found" / "cannot open shared object file" instead.
          echo "$out" | grep -q "usage: ciris-status" \
            || { echo "::error::image binary failed to exec (glibc/.so runtime gap) — never reached the argparser"; exit 1; }
      - name: Boot smoke — the node must actually SERVE /health (catches router/boot panics)
        run: |
          # The check that would have caught CIRISStatus#7 (the v0.3.7 /health
          # route-collision crash-loop): a panic at serve_with_adapter router
          # construction. The arg-exec step above never boots the node, so it
          # sailed straight through. This one boots it and proves it serves.
          docker run -d --name statusboot -p 4243:4243 ciris-status:smoke \
            --home /tmp/ciris --key-id ci-smoke
          ok=0
          for i in $(seq 1 40); do
            # Bail FAST if the container died — a boot panic / crash-loop.
            if [ "$(docker inspect -f '{{.State.Running}}' statusboot 2>/dev/null)" != "true" ]; then
              echo "::error::container exited during boot (router/boot panic or crash-loop)"
              docker logs statusboot 2>&1 | tail -40; exit 1
            fi
            if curl -sf -m3 http://127.0.0.1:4243/health 2>/dev/null | grep -q '"status":"ok"'; then ok=1; break; fi
            sleep 2
          done
          docker logs statusboot 2>&1 | tail -20
          docker rm -f statusboot >/dev/null 2>&1 || true
          [ "$ok" = 1 ] || { echo "::error::node never served GET /health within ~80s (boot failure)"; exit 1; }
          echo "✅ boot smoke OK — node booted clean and served GET /health"
