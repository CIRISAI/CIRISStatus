# Node B — ciris-status as a fabric monitoring node (FSD/MONITORING_NODE_DESIGN.md §5).
#
# Runs the `--features fabric` image: Flow A reads `capacity:*` signed `scores`
# from ciris-server's corpus and projects the public roster; Flow B probes
# off-fabric infra and emits signed `health:liveness` attestations back into the
# corpus. Serves the website surface (`/api/v1/scoring`, SSE/WS, status, history)
# that ciris.ai consumes.
#
# Usage:
#   1. copy .env.example → .env and fill the STATUS_* fabric vars (see DEPLOY.md)
#   2. docker compose -f docker-compose.fabric.yml up -d
#
# The corpus is SHARED with Node A (ciris-server). In the canonical topology Node
# A owns the corpus and Node B reads/writes it via STATUS_CORPUS_DSN. Mount it
# read-write (Flow B emits health:liveness). If Node A runs on a different host,
# point STATUS_CORPUS_DSN at the replicated/networked corpus instead of a bind
# mount.

services:
  ciris-status:
    image: ghcr.io/cirisai/cirisstatus:${CIRIS_STATUS_TAG:-latest}
    # To build locally instead of pulling the blessed image:
    #   docker compose -f docker-compose.fabric.yml build
    build:
      context: .
      args:
        FEATURES: fabric
    container_name: ciris-status
    restart: unless-stopped
    # Bind to the host loopback; nginx/Caddy terminates TLS and proxies in.
    ports:
      - "127.0.0.1:8200:8200"
    env_file:
      - .env
    environment:
      # Listen on all interfaces INSIDE the container (host maps loopback:8200).
      STATUS_LISTEN_ADDR: 0.0.0.0:8200
      STATUS_DB_PATH: /data/status.db
      # ── Fabric node (Node B) — REQUIRED for the fabric flows ──────────────
      # All of these must be set or the flows stay disabled (binary runs as the
      # plain prober; roster stays empty). See DEPLOY.md for the full reference.
      STATUS_CORPUS_DSN: ${STATUS_CORPUS_DSN:?set the shared ciris-server corpus DSN}
      STATUS_NODE_KEY_ID: ${STATUS_NODE_KEY_ID:?set the node Ed25519 key_id}
      STATUS_NODE_KEY_PATH: /secrets/ed25519.seed
      STATUS_NODE_PQC_KEY_ID: ${STATUS_NODE_PQC_KEY_ID:?set the node ML-DSA key_id}
      STATUS_NODE_PQC_KEY_PATH: /secrets/mldsa65.seed
      # region-key → keyed CIRIS service node key_id (providers fold in as evidence)
      STATUS_SERVICE_KEYS: ${STATUS_SERVICE_KEYS:-}
    volumes:
      # Uptime history DB (Node B's own SQLite, NOT the corpus).
      - status-data:/data
      # The shared fabric corpus (Node A's). Adjust the host path / DSN to your
      # deployment; STATUS_CORPUS_DSN must resolve INSIDE the container.
      - ${CIRIS_CORPUS_HOST_PATH:-./corpus}:/corpus
      # Node identity seeds (ed25519 + ml-dsa-65, 32 raw bytes each, chmod 600).
      - ${CIRIS_STATUS_SECRETS:-./secrets}:/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8200/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  status-data:
